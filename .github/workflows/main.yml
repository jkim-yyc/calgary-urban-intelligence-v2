name: Nexus Intelligence Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  build_intelligence:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy requests

    - name: Execute Weighted Strategic Pipeline
      run: python script/main.py

    - name: Commit Intelligence Feed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/nexus_intelligence_feed.csv
        git commit -m "Automated Weighted Neural Feed Update" || echo "No changes to commit"
        git push
