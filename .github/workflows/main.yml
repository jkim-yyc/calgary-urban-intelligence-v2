name: Nexus_Update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Automatically runs at Midnight every Sunday

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for the bot to save the CSV to your repo
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install pandas requests
        
      - name: Execute Strategy Engine
        run: python script/main.py
        
      - name: Commit and Push Results
        run: |
          git config --global user.name "Nexus-Bot"
          git config --global user.email "actions@github.com"
          git add data/calgary_strategy_kpis.csv
          git commit -m "Strategic Intelligence Update: $(date +'%Y-%m-%d')" || exit 0
          git push
