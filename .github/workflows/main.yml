name: Nexus_Update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install pandas requests
      - name: Run Strategy Engine
        run: python script/main.py
      - name: Commit and Push
        run: |
          git config --global user.name "Nexus-Bot"
          git config --global user.email "actions@github.com"
          if [ -f data/calgary_strategy_kpis.csv ]; then
            git add data/calgary_strategy_kpis.csv
            git commit -m "Strategic Update: $(date +'%Y-%m-%d')" || exit 0
            git push
          else
            echo "Error: Output file not found."
            exit 1
          fi
