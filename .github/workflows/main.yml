name: Nexus Production Sync

on:
  schedule:
    - cron: '0 0 * * 1'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_nexus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Core Dependencies
        run: pip install pandas numpy requests

      - name: Execute Intelligence Pipeline
        run: python script/main.py

      - name: Deploy to GitHub Data Stream
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Fetch the latest changes from the server
          git fetch origin main
          
          # 2. Force the local index to match the server's code, 
          # but keep our NEWly generated data/nexus_intelligence_feed.csv
          git reset --mixed origin main
          
          # 3. Add the newly generated data
          mkdir -p data
          git add data/nexus_intelligence_feed.csv
          
          # 4. Commit and Push (using --force to clear the conflict)
          git commit -m "Strategic Refresh [skip ci]" || echo "Clean State"
          git push origin main --force
