name: Calgary Strategic Intelligence Nexus - Neural Feed

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build_intelligence:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Neural Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy

    - name: Execute Strategic Intelligence Pipeline
      run: python main.py

    - name: Commit Updated Intelligence Feed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add nexus_intelligence_feed.csv
        git commit -m "Neural Feed Update: $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
