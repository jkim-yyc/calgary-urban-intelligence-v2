name: Nexus_Main_Pipeline

on:
  workflow_dispatch:
  schedule:
    # Runs Daily at Midnight UTC
    - cron: '0 0 * * *'

jobs:
  run_nexus:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: pip install pandas requests
        
      - name: Execute Strategy Engine
        run: python script/main.py
        
      - name: Commit Intelligence Update
        run: |
          git config --global user.name "Nexus-Bot"
          git config --global user.email "actions@github.com"
          git add data/*
          git commit -m "Automated Strategic Pulse: $(date +'%Y-%m-%d')" || exit 0
          git push
