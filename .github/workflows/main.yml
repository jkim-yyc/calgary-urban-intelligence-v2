name: Nexus_Update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install pandas requests
        
      - name: Run Strategy Engine
        run: python script/main.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "Nexus-Bot"
          git config --global user.email "actions@github.com"
          # Git add the entire data directory to catch both CSV and GeoJSON
          git add data/*
          git commit -m "Strategic Pulse Update: $(date +'%Y-%m-%d')" || exit 0
          git push
