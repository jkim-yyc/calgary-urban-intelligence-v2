name: Nexus_Update

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at midnight
  workflow_dispatch: # Manual trigger button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Requirements
        run: pip install pandas requests

      - name: Execute Strategy Script
        run: python script/main.py

      - name: Push Data to Repo
        run: |
          git config --global user.name "Nexus-Bot"
          git config --global user.email "actions@github.com"
          git add data/calgary_strategy_kpis.csv
          git commit -m "Automated Weekly Strategic Refresh" || exit 0
          git push
