name: Nexus_Update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRITICAL for committing the CSV
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install pandas requests
      - name: Run Engine
        run: python script/main.py
      - name: Commit and Push
        run: |
          git config --global user.name "Nexus-Bot"
          git config --global user.email "actions@github.com"
          git add data/calgary_strategy_kpis.csv
          git commit -m "Strategic Update: $(date +'%Y-%m-%d')" || exit 0
          git push
