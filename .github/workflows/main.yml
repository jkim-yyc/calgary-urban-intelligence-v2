name: Nexus Intelligence Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_intelligence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for rebasing

      - name: Setup Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Logic
        run: pip install pandas requests

      - name: Run Intelligence Engine
        run: python script/main.py

      - name: Sync and Deploy Data
        run: |
          git config user.name "Nexus Bot"
          git config user.email "actions@github.com"
          git add data/nexus_intelligence_feed.csv
          
          # Only commit if changes exist
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated Refresh: $(date +'%Y-%m-%d')"
          
          # Rebase ensures our new data sits on top of any remote changes
          git pull --rebase origin main
          
          # Final push
          git push origin main
