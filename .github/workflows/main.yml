name: Nexus_Main_Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Daily update at midnight

jobs:
  run_nexus:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Initialize Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install Tools
        run: pip install pandas requests
        
      - name: Run Script
        run: python script/main.py
        
      - name: Commit Data
        run: |
          git config --global user.name "Nexus-Bot"
          git config --global user.email "actions@github.com"
          git add data/*
          git commit -m "Automated Pulse Sync: $(date +'%Y-%m-%d')" || exit 0
          git push
