name: Nexus_Strategy_Pulse

on:
  workflow_dispatch:
  schedule:
    # Runs every Sunday at Midnight
    - cron: '0 0 * * 0'

jobs:
  update_nexus:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/set-up-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: pip install pandas requests
        
      - name: Execute Strategy Engine
        run: python script/main.py
        
      - name: Commit Intelligence Update
        run: |
          git config --global user.name "Nexus-Bot"
          git config --global user.email "actions@github.com"
          git add data/*
          git commit -m "Strategic Pulse Sync: $(date +'%Y-%m-%d')" || exit 0
          git push
