name: Nexus Intelligence Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

# Security: Only allow the GITHUB_TOKEN to write to the repository
permissions:
  contents: write

jobs:
  nexus_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install Dependencies
        run: pip install pandas requests

      - name: Run Engine
        run: python script/main.py

      - name: Commit & Push
        run: |
          git config user.name "Nexus Bot"
          git config user.email "actions@github.com"
          git add data/nexus_intelligence_feed.csv
          git commit -m "Automated Nexus Feed Update" || exit 0
          git push
