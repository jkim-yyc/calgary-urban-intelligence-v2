name: Nexus_Intelligence_Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  nexus_update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: pip install pandas requests
        
      - name: Run Strategy Engine
        run: python script/main.py
        
      - name: Push to Repository
        run: |
          git config --global user.name "Nexus-Bot"
          git config --global user.email "actions@github.com"
          git add data/*
          git commit -m "Strategic Pulse Update: $(date +'%Y-%m-%d')" || exit 0
          git push
