name: Nexus Intelligence Sync

on:
  schedule:
    - cron: '0 9 * * 1' # Runs every Monday at 9 AM
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
      - name: Dependencies
        run: pip install pandas numpy requests
      - name: Execute
        run: python main.py
      - name: Commit
        run: |
          git config --global user.name "Nexus-Bot"
          git config --global user.email "bot@nexus.ai"
          git add data/nexus_intelligence_feed.csv
          git commit -m "Strategic Refresh [skip ci]" || echo "No changes"
          git push
