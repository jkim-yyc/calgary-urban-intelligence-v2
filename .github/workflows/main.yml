name: Nexus_Update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at Midnight

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install pandas requests
        
      - name: Run Strategy Engine
        run: python script/main.py
        
      - name: Commit and Push Results
        run: |
          git config --global user.name "Nexus-Bot"
          git config --global user.email "actions@github.com"
          # Check for file existence to prevent workflow failure
          if [ -f data/calgary_strategy_kpis.csv ]; then
            git add data/calgary_strategy_kpis.csv
            git commit -m "Strategic Pulse Update: $(date +'%Y-%m-%d')" || exit 0
            git push
          else
            echo "Error: Output file not found. Skipping push."
            exit 1
          fi
