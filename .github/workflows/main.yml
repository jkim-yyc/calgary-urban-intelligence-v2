name: Nexus Production Sync

on:
  schedule:
    - cron: '0 0 * * 1'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_nexus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install ETL Dependencies
        run: pip install pandas numpy requests

      - name: Execute Intelligence Pipeline
        run: python script/main.py

      - name: Deploy to GitHub Data Stream
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Add and commit the new data first
          mkdir -p data
          git add data/nexus_intelligence_feed.csv
          git commit -m "Strategic Refresh: Level 2 Intelligence [skip ci]" || echo "No changes to commit"
          
          # 2. Push directly to the remote main branch using force
          # This bypasses the 'ambiguous argument' issue by being explicit
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main --force
