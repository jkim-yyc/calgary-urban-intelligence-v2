name: Nexus Production Sync

on:
  schedule:
    - cron: '0 0 * * 1'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_nexus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Essential for rebasing/pulling history

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Core Dependencies
        run: pip install pandas numpy requests

      - name: Execute Intelligence Pipeline
        run: python script/main.py

      - name: Deploy to GitHub Data Stream
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p data
          git add data/nexus_intelligence_feed.csv
          # The Rebase Pull ensures the bot is synced with your manual pushes
          git pull --rebase origin main
          git commit -m "Strategic Refresh [skip ci]" || echo "Clean State"
          git push origin main
