name: Nexus Production Sync

on:
  schedule:
    - cron: '0 0 * * 1'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_nexus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Core Dependencies
        run: pip install pandas numpy requests

      - name: Execute Intelligence Pipeline
        run: python script/main.py

      - name: Deploy to GitHub Data Stream
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Stage the changes
          mkdir -p data
          git add data/nexus_intelligence_feed.csv
          
          # 2. Commit locally first (This clears the "uncommitted changes" error)
          git commit -m "Strategic Refresh [skip ci]" || echo "No changes to commit"
          
          # 3. Pull remote changes and put our commit on top
          git pull --rebase origin main
          
          # 4. Push the combined history
          git push origin main
