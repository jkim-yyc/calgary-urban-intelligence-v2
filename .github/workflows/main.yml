name: Nexus Production Sync

on:
  schedule:
    - cron: '0 0 * * 1' # Weekly Monday Refresh
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_nexus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Setup Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install ETL Dependencies
        run: pip install pandas numpy requests

      - name: Execute Intelligence Pipeline
        run: python script/main.py

      - name: Deploy to GitHub Data Stream
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force synchronization with remote to avoid push rejections
          git fetch origin main
          git reset --mixed origin main
          
          mkdir -p data
          git add data/nexus_intelligence_feed.csv
          
          # Commit only if changes exist, push with force to overwrite data conflicts
          git commit -m "Strategic Refresh: Level 2 Intelligence [skip ci]" || echo "Clean State"
          git push origin main --force
